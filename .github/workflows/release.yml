name: Release

# Two ways to trigger a signed release build:
#   1. push a tag like "v0.2.0"            -> a real, non-prerelease Release
#   2. run this workflow manually (Actions tab -> Release -> Run workflow)
#                                           -> a "build-<n>" prerelease
#
# Either way the APK is signed with the one persistent keystore (see
# app/build.gradle.kts + docs/SIGNING.md) so it always installs cleanly
# over whatever the previous release was.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this build'
        required: false
        default: ''

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, and publish release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Decode signing keystore
        env:
          SF_KEYSTORE_BASE64: ${{ secrets.SF_KEYSTORE_BASE64 }}
          SF_KEYSTORE_PASSWORD: ${{ secrets.SF_KEYSTORE_PASSWORD }}
          SF_KEY_ALIAS: ${{ secrets.SF_KEY_ALIAS }}
          SF_KEY_PASSWORD: ${{ secrets.SF_KEY_PASSWORD }}
        run: |
          if [ -z "$SF_KEYSTORE_BASE64" ]; then
            echo "::error::SF_KEYSTORE_BASE64 secret is not set — a release build must be signed."
            echo "::error::Run scripts/create_keystore.sh once and add the secrets it prints."
            echo "::error::See docs/SIGNING.md for the full one-time setup."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "$SF_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore/surffountain.jks"
          {
            echo "SF_KEYSTORE_PATH=$RUNNER_TEMP/keystore/surffountain.jks"
            echo "SF_KEYSTORE_PASSWORD=$SF_KEYSTORE_PASSWORD"
            echo "SF_KEY_ALIAS=$SF_KEY_ALIAS"
            echo "SF_KEY_PASSWORD=$SF_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build signed release APK
        run: gradle assembleRelease --no-daemon

      - name: Read version name
        id: version
        run: |
          VERSION_NAME=$(grep -oP '(?<=versionName = ")[^"]+' app/build.gradle.kts)
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: surf-fountain-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            EXTRA_FLAG=""
          else
            TAG="build-${{ github.run_number }}"
            EXTRA_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            app/build/outputs/apk/release/*.apk \
            --title "Surf Fountain ${{ steps.version.outputs.version_name }} (build ${{ github.run_number }})" \
            --notes "${{ github.event.inputs.release_notes || 'Automated release build.' }}" \
            $EXTRA_FLAG
